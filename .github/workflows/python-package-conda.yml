name: Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-posix:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 5
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel]
      fail-fast: false
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v4
    - if: matrix.os == 'ubuntu-latest'
      name: Install dependencies
      run: |
        sudo apt-get update
    - name: Use Mamba to create env
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-file: env-dev.yml
        environment-name: eeldev
        init-shell: bash
        cache-environment: true
        post-cleanup: 'all'
        # Speed up env creation (TODO: 3.12 because of rpy2 pin at least)
        create-args: |
          mayavi=4.8.3 vtk=9.4.2 python=3.12 -v
    # Get MNE testing data
    - uses: actions/checkout@v4
      with:
        repository: mne-tools/mne-python
        ref: maint/1.11
        path: ./mne-python
    - run: ./tools/get_testing_version.sh
      working-directory: ./mne-python
    - uses: actions/cache@v4
      with:
        key: ${{ env.TESTING_VERSION }}
        path: ~/mne_data
    - run: ./tools/github_actions_download.sh
      working-directory: ./mne-python
    # Continue testing
    - name: Build eelbrain
      run: pip install --no-deps -e .
    - uses: pyvista/setup-headless-display-action@v4
      with:
        qt: true
        pyvista: false
        wm: false
    - name: Test with GUIs
      run: pytest eelbrain --cov --cov-branch --cov-report=xml -v --durations=10
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
