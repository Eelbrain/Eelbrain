name: Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-posix:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"  # Lowest version supported on conda-forge
          - os: macos-latest
            python: "3.12"
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v4
    - if: matrix.os == 'ubuntu-latest'
      name: Install dependencies
      run: |
        sudo apt-get update
    - name: Use Mamba to create env
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-file: env-test.yml
        environment-name: eeltest
        init-shell: bash
        cache-environment: true
        post-cleanup: 'all'
        # Speed up env creation by pinning a couple of packages
        create-args: |
          mayavi=4.8.3 vtk=9.4.2 python=3.13 noqt5 pyside6=6.9.2 -v
    # Get MNE testing data
    - uses: actions/checkout@v4
      with:
        repository: mne-tools/mne-python
        ref: maint/1.11
        path: ./mne-python
    - run: ./tools/get_testing_version.sh
      working-directory: ./mne-python
    - uses: actions/cache@v4
      with:
        key: ${{ env.TESTING_VERSION }}
        path: ~/mne_data
    - run: ./tools/github_actions_download.sh
      working-directory: ./mne-python
    # Continue testing
    - name: Build eelbrain
      run: pip install --no-deps -e .
    - uses: pyvista/setup-headless-display-action@v4
      with:
        qt: true
        pyvista: false
        wm: false
    - name: Cache MNE datasets
      uses: actions/cache@v4
      with:
        path: ~/mne_data
        key: mne-data-${{ matrix.os }}-${{ hashFiles('env-test.yml') }}
    - name: Download MNE datasets
      run: |
        python -c "import mne; mne.datasets.sample.data_path(verbose=False); mne.datasets.testing.data_path(verbose=False); mne.datasets.fetch_fsaverage(verbose=False)"
    - name: Test with GUIs and code-cov
      timeout-minutes: 20
      run: |
        pytest eelbrain --cov --cov-branch --cov-report=xml
    - if: matrix.os == 'macos-latest'
      name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
